<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Thread Flipbook</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- Driver.js Onboarding Library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.css" />

  <!-- Flipbook Library -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <!-- Driver.js Onboarding Library -->
  <script src="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.js.iife.js"></script>
</head>

<body>

  <div class="viewer">

    <!-- Slide-out table of contents -->
    <button class="toc-toggle" id="tocToggle" aria-label="Open contents">
      ❯
    </button>

    <aside class="toc-panel" id="tocPanel">
      <div class="toc-header">
        <div>
          <div class="toc-label">Thread</div>
          <h2>Contents</h2>
        </div>

        <button class="toc-close" id="tocClose" aria-label="Close contents">
          ×
        </button>
      </div>

      <div class="toc-list">
        <button class="toc-item" data-page="5">
          <span>From the Editor’s Desk</span>
          <em>Page 5</em>
        </button>

        <button class="toc-item" data-page="6">
          <span>Your Health, Upgraded</span>
          <em>Page 6</em>
        </button>

        <button class="toc-item" data-page="8">
          <span>Uninterrupted Insights</span>
          <em>Page 8</em>
        </button>

        <button class="toc-item" data-page="10">
          <span>Healing with Code</span>
          <em>Page 10</em>
        </button>

        <button class="toc-item" data-page="12">
          <span>From Data to Diagnosis</span>
          <em>Page 12</em>
        </button>

        <button class="toc-item" data-page="14">
          <span>Data Pipelines That Save Lives</span>
          <em>Page 14</em>
        </button>

        <button class="toc-item" data-page="18">
          <span>Case Study: Personalized CRISPR</span>
          <em>Page 18</em>
        </button>

        <button class="toc-item" data-page="20">
          <span>AI-Driven Robotic Surgery</span>
          <em>Page 20</em>
        </button>

        <button class="toc-item" data-page="22">
          <span>Digitizing the Last Mile</span>
          <em>Page 22</em>
        </button>

        <button class="toc-item" data-page="24">
          <span>Living with Health Scores</span>
          <em>Page 24</em>
        </button>

        <button class="toc-item" data-page="26">
          <span>Crossword Puzzle</span>
          <em>Page 26</em>
        </button>

        <button class="toc-item" data-page="27">
          <span>Meet the Team</span>
          <em>Page 27</em>
        </button>
      </div>
    </aside>

    <div class="toc-backdrop" id="tocBackdrop"></div>

    <!-- Top bar -->
    <header class="top-bar">
      <div class="magazine-title" id="tourTitle">Thread</div>
      <div class="page-counter" id="pageCounter">page 1 of 28</div>
    </header>

    <!-- Main flipbook area -->
    <main class="book-area">

      <button class="side-arrow left-arrow" id="prevBtn" aria-label="Previous page">
        ‹
      </button>

      <div class="book-shell" id="bookShell">
        <div id="book"></div>
      </div>

      <button class="side-arrow right-arrow" id="nextBtn" aria-label="Next page">
        ›
      </button>

    </main>

    <!-- Bottom icon controls -->
    <div class="bottom-controls">
      <button class="icon-btn" id="soundBtn" title="Sound">
        🔊
      </button>

      <button class="icon-btn" id="zoomBtn" title="Zoom">
        🔍
      </button>

      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">
        ⛶
      </button>

      <button class="icon-btn tour-btn" id="tourBtn" title="Guide">
        ?
      </button>
    </div>

  </div>

  <script src="js/script.js"></script>

</body>
</html>
